<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phantasy Allure — A World of Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0D0F1A;
      --burgundy: #6B1B3A;
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --parchment: #F0EBE0;
      --smoke: #FAF8F5;
      --text-light: #D4C9B8;
      --text-dim: #8A7F72;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      background-color: var(--navy);
      color: var(--text-light);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
      max-width: 100vw;
    }

    /* ─── HERO ─────────────────────────────────────────── */
    #hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('hero-bg.jpg');
      background-size: auto 100%;
      background-position: 0% center;
      background-repeat: no-repeat;
      animation: heroPan 25s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes heroPan {
      from { background-position: 0% center; }
      to   { background-position: 100% center; }
    }

    .hero-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 30%, rgba(13,15,26,0.75) 100%),
        linear-gradient(to bottom, rgba(13,15,26,0.35) 0%, rgba(13,15,26,0.55) 55%, rgba(13,15,26,0.92) 100%);
      z-index: 1;
    }

    .hero-shimmer {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(201,168,76,0.08) 0%, transparent 65%);
      animation: shimmerPulse 6s ease-in-out infinite alternate;
      z-index: 2;
      pointer-events: none;
    }

    @keyframes shimmerPulse {
      from { opacity: 0.4; }
      to   { opacity: 1; }
    }

    #particle-canvas {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    /* ─── NAV ─────────────────────────────────────────── */
    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(1rem, 3vw, 1.5rem) clamp(1.2rem, 5vw, 3.5rem);
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 3.5vw, 1.65rem);
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--text-light);
      text-decoration: none;
    }

    .nav-logo span {
      color: var(--gold);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: clamp(0.8rem, 3vw, 2rem);
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--text-light);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.85;
      transition: opacity 0.2s, color 0.2s;
    }

    .nav-links a:hover {
      opacity: 1;
      color: var(--gold-light);
    }

    .nav-portal {
      color: var(--gold) !important;
      border: 1px solid rgba(201,168,76,0.45) !important;
      border-radius: 999px !important;
      padding: 0.35rem 1.1rem !important;
      opacity: 1 !important;
      transition: background 0.2s, border-color 0.2s !important;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-portal:hover {
      background: rgba(201,168,76,0.12) !important;
      border-color: var(--gold) !important;
      color: var(--gold-light) !important;
    }

    /* ─── HERO CONTENT ────────────────────────────────── */
    .hero-content {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: clamp(1.5rem, 5vw, 3rem) clamp(1.2rem, 5vw, 2rem);
    }

    .hero-eyebrow {
      font-size: clamp(0.65rem, 1.8vw, 0.78rem);
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.2rem;
    }

    .hero-headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 7vw, 5.2rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--smoke);
      margin-bottom: 1.1rem;
      max-width: 780px;
    }

    .hero-headline em {
      font-style: italic;
      color: var(--gold-light);
    }

    .hero-subtitle {
      font-size: clamp(0.88rem, 2.2vw, 1.1rem);
      color: var(--text-dim);
      letter-spacing: 0.08em;
      margin-bottom: 1.8rem;
    }

    .hero-divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 2.2rem;
      opacity: 0.45;
    }

    .hero-divider::before,
    .hero-divider::after {
      content: '';
      width: clamp(40px, 8vw, 80px);
      height: 1px;
      background: var(--gold);
    }

    .hero-divider-icon {
      color: var(--gold);
      font-size: 0.85rem;
    }

    .hero-cta {
      display: inline-block;
      text-decoration: none;
      background: var(--burgundy);
      color: var(--parchment);
      font-family: 'Lato', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.9rem 2.4rem;
      border: 1px solid rgba(201,168,76,0.3);
      transition: background 0.25s, border-color 0.25s, color 0.25s;
    }

    .hero-cta:hover {
      background: rgba(107,27,58,0.8);
      border-color: var(--gold);
      color: var(--gold-light);
    }

    .hero-tagline {
      position: absolute;
      bottom: clamp(1.2rem, 3vw, 2rem);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.72rem, 1.6vw, 0.85rem);
      color: var(--text-dim);
      letter-spacing: 0.05em;
      white-space: normal;
      text-align: center;
      width: max-content;
      max-width: 90vw;
      opacity: 0.7;
    }

    /* ─── LIBRARY ─────────────────────────────────────── */
    #library {
      padding: clamp(4rem, 8vw, 7rem) clamp(1.2rem, 5vw, 4rem);
      max-width: 1320px;
      margin: 0 auto;
    }

    .section-eyebrow {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      display: block;
      margin-bottom: 0.7rem;
      text-align: center;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 5vw, 3rem);
      font-weight: 600;
      color: var(--parchment);
      text-align: center;
      margin-bottom: clamp(2.5rem, 5vw, 4rem);
    }

    .stories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 2rem;
    }

    /* ─── STORY CARD ──────────────────────────────────── */
    .story-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,168,76,0.12);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .story-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(201,168,76,0.18), 0 4px 16px rgba(0,0,0,0.5);
    }

    .story-card:hover .card-cover-img {
      transform: scale(1.05);
    }

    .card-cover-wrap {
      width: 100%;
      aspect-ratio: 2 / 3;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, #1a0d1f 0%, #0d1a2a 100%);
      flex-shrink: 0;
    }

    .card-cover-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.45s ease;
    }

    .card-cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      color: rgba(201,168,76,0.25);
      background: linear-gradient(145deg, rgba(107,27,58,0.35) 0%, rgba(13,15,26,0.9) 100%);
    }

    .card-body {
      padding: 1.1rem 1.2rem 3.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--parchment);
      line-height: 1.3;
    }

    .card-meta {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .card-excerpt {
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-parts-badge {
      position: absolute;
      bottom: 0.9rem;
      right: 1.1rem;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: rgba(13,15,26,0.7);
      border: 1px solid rgba(138,127,114,0.25);
      padding: 0.22rem 0.6rem;
    }

    /* ─── LOADING / EMPTY ─────────────────────────────── */
    .stories-loading,
    .stories-empty {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 1rem;
      gap: 1.2rem;
      text-align: center;
    }

    .stories-empty-icon {
      font-size: 3.5rem;
      color: rgba(201,168,76,0.15);
      line-height: 1;
    }

    .stories-empty p {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--text-dim);
    }

    .stories-loading p {
      font-size: 0.9rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    /* ─── MODAL ───────────────────────────────────────── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8,9,18,0.88);
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
      padding: clamp(1rem, 4vw, 2.5rem) clamp(0.8rem, 3vw, 1.5rem);
    }

    #modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .modal-inner {
      background: var(--navy);
      border: 1px solid rgba(201,168,76,0.18);
      width: 100%;
      max-width: 860px;
      min-height: 300px;
      position: relative;
      margin: auto;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
      overflow-x: hidden;
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1.2rem;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 10;
      line-height: 1;
      padding: 0.2rem 0.4rem;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--gold-light);
    }

    /* ─── PARTS VIEW ──────────────────────────────────── */
    #view-parts {
      display: none;
      padding: clamp(2rem, 5vw, 3.5rem) clamp(1.5rem, 5vw, 3rem);
    }

    #view-parts.active {
      display: block;
    }

    .parts-story-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.7rem, 5vw, 2.6rem);
      font-weight: 700;
      color: var(--parchment);
      line-height: 1.2;
      margin-bottom: 0.7rem;
      padding-right: 2.5rem;
    }

    .parts-story-desc {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 2vw, 1rem);
      color: var(--text-dim);
      line-height: 1.7;
      max-width: 600px;
      margin-bottom: 1.8rem;
    }

    .parts-divider {
      height: 1px;
      background: linear-gradient(to right, var(--gold), transparent);
      opacity: 0.3;
      margin-bottom: 2.2rem;
    }

    .parts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.5rem;
    }

    .part-card {
      cursor: pointer;
      border: 1px solid rgba(201,168,76,0.1);
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
      background: rgba(255,255,255,0.02);
    }

    .part-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(201,168,76,0.14);
    }

    .part-card-cover {
      width: 100%;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(107,27,58,0.4) 0%, rgba(13,15,26,0.9) 100%);
      position: relative;
    }

    .part-card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .part-card-cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: rgba(201,168,76,0.2);
    }

    .part-card-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      padding: 0.8rem 0.9rem 0.2rem;
    }

    .part-card-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--parchment);
      padding: 0 0.9rem 0.9rem;
      line-height: 1.3;
    }

    /* ─── READING VIEW ────────────────────────────────── */
    #view-reading {
      display: none;
      padding: clamp(2rem, 5vw, 3.5rem) clamp(1.5rem, 5vw, 3rem);
    }

    #view-reading.active {
      display: block;
    }

    .reading-back {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.8rem;
      padding: 0;
      transition: color 0.2s;
    }

    .reading-back:hover {
      color: var(--gold-light);
    }

    .reading-eyebrow {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.7rem;
    }

    .reading-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.7rem, 5vw, 2.8rem);
      font-weight: 700;
      color: var(--parchment);
      line-height: 1.2;
      margin-bottom: 1.5rem;
      padding-right: 2.5rem;
    }

    .reading-cover-wrap {
      width: 100%;
      max-height: 380px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .reading-cover-wrap img {
      width: 100%;
      height: 380px;
      object-fit: cover;
      display: block;
    }

    .reading-body {
      font-family: 'Playfair Display', serif;
      font-size: clamp(0.95rem, 2.2vw, 1.08rem);
      font-weight: 400;
      line-height: 1.9;
      color: var(--text-light);
      max-width: 660px;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .reading-body p + p {
      margin-top: 1.2em;
    }

    /* ─── FOOTER ──────────────────────────────────────── */
    footer {
      border-top: 1px solid rgba(201,168,76,0.1);
      padding: 2.5rem 1.5rem;
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    footer em {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--gold);
    }

    /* ─── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 520px) {
      .stories-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 1.2rem;
      }

      .parts-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 1rem;
      }

      .nav-links {
        gap: 0.6rem;
      }
    }

    @media (max-width: 380px) {
      .stories-grid {
        grid-template-columns: 1fr 1fr;
        gap: 0.9rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-bg { animation: none; }
      .hero-shimmer { animation: none; }
      .story-card,
      .part-card { transition: none; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════ HERO ═══════════════════════════ -->
<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-vignette"></div>
  <div class="hero-shimmer"></div>
  <canvas id="particle-canvas"></canvas>

  <nav>
    <a href="#" class="nav-logo">Phantasy <span>Allure</span></a>
    <div class="nav-links">
      <a href="#library">Library</a>
      <a href="#library">New Tales</a>
      <a href="admin.html" class="nav-portal">✦ Author Portal</a>
    </div>
  </nav>

  <div class="hero-content">
    <p class="hero-eyebrow">A World of Stories</p>
    <h1 class="hero-headline">Where stories become <em>worlds</em></h1>
    <p class="hero-subtitle">Romance. Magic. Darkness. Wonder.</p>
    <div class="hero-divider">
      <span class="hero-divider-icon">✦</span>
    </div>
    <a href="#library" class="hero-cta">Enter the Library</a>
  </div>

  <span class="hero-tagline">shadows of stories untold</span>
</section>

<!-- ═══════════════════════════ LIBRARY ═══════════════════════ -->
<section id="library">
  <span class="section-eyebrow">The Collection</span>
  <h2 class="section-title">All Stories</h2>
  <div class="stories-grid" id="stories-grid">
    <div class="stories-loading">
      <p>Loading stories…</p>
    </div>
  </div>
</section>

<!-- ═══════════════════════════ MODAL ════════════════════════ -->
<div id="modal-overlay" role="dialog" aria-modal="true" aria-label="Story reader">
  <div class="modal-inner" id="modal-inner">
    <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>

    <!-- Parts view -->
    <div id="view-parts">
      <h2 class="parts-story-title" id="parts-title"></h2>
      <p class="parts-story-desc" id="parts-desc"></p>
      <div class="parts-divider"></div>
      <div class="parts-grid" id="parts-grid"></div>
    </div>

    <!-- Reading view -->
    <div id="view-reading">
      <button class="reading-back" id="reading-back" data-mode="close">
        ← <span id="back-label">Close</span>
      </button>
      <p class="reading-eyebrow" id="reading-eyebrow"></p>
      <h2 class="reading-title" id="reading-title"></h2>
      <div class="reading-cover-wrap" id="reading-cover-wrap" style="display:none;"></div>
      <div class="reading-body" id="reading-body"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════ FOOTER ═══════════════════════ -->
<footer>
  &copy; <em>Phantasy Allure</em> &mdash; All stories are original works
</footer>

<script>
  /* ─── PARTICLES ─────────────────────────────────────────── */
  (function () {
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const COUNT = 38;

    function resize() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }

    function makeParticle() {
      return {
        x:    Math.random() * canvas.width,
        y:    Math.random() * canvas.height,
        r:    Math.random() * 1.4 + 0.4,
        dx:   (Math.random() - 0.5) * 0.22,
        dy:   -(Math.random() * 0.28 + 0.06),
        alpha: Math.random() * 0.55 + 0.15,
        gold: Math.random() > 0.4,
        flicker: Math.random() * Math.PI * 2,
        flickerSpeed: (Math.random() * 0.02 + 0.008)
      };
    }

    function init() {
      resize();
      particles = [];
      for (let i = 0; i < COUNT; i++) particles.push(makeParticle());
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const p of particles) {
        p.flicker += p.flickerSpeed;
        const a = p.alpha * (0.7 + 0.3 * Math.sin(p.flicker));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.gold
          ? `rgba(201,168,76,${a})`
          : `rgba(240,235,224,${a * 0.6})`;
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;
        if (p.y < -4)  p.y = canvas.height + 4;
        if (p.x < -4)  p.x = canvas.width + 4;
        if (p.x > canvas.width + 4) p.x = -4;
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => {
      resize();
      /* redistribute particles within new bounds */
      for (const p of particles) {
        if (p.x > canvas.width)  p.x = Math.random() * canvas.width;
        if (p.y > canvas.height) p.y = Math.random() * canvas.height;
      }
    });

    init();
    draw();
  })();

  /* ─── STATE ─────────────────────────────────────────────── */
  let allStories = [];
  let currentStory = null;

  /* ─── MODAL HELPERS ─────────────────────────────────────── */
  const overlay      = document.getElementById('modal-overlay');
  const viewParts    = document.getElementById('view-parts');
  const viewReading  = document.getElementById('view-reading');
  const modalInner   = document.getElementById('modal-inner');

  function openModal() {
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
    viewParts.classList.remove('active');
    viewReading.classList.remove('active');
    currentStory = null;
    overlay.scrollTop = 0;
  }

  function scrollModalTop() {
    overlay.scrollTop = 0;
  }

  /* ─── OPEN STORY ─────────────────────────────────────────── */
  function openStory(id) {
    const story = allStories.find(s => s.id === id);
    if (!story) return;
    currentStory = story;

    const parts = story.parts || [];

    if (parts.length <= 1) {
      const source = parts.length === 1 ? parts[0] : story;
      showReadingView(story, source, false);
    } else {
      showPartsView(story);
    }

    openModal();
  }

  function showPartsView(story) {
    viewReading.classList.remove('active');
    viewParts.classList.add('active');

    document.getElementById('parts-title').textContent = story.title || '';
    document.getElementById('parts-desc').textContent  = story.excerpt || '';

    const grid = document.getElementById('parts-grid');
    grid.innerHTML = (story.parts || []).map((part, i) => {
      const coverHTML = part.cover
        ? `<img src="${escapeAttr(part.cover)}" alt="${escapeAttr(part.title || '')}" loading="lazy" />`
        : `<div class="part-card-cover-placeholder">✦</div>`;
      return `
        <div class="part-card" onclick="openPart(${escapeAttr(String(story.id))}, ${i})">
          <div class="part-card-cover">${coverHTML}</div>
          <p class="part-card-label">Part ${i + 1}</p>
          <p class="part-card-name">${escapeHTML(part.title || '')}</p>
        </div>`;
    }).join('');

    scrollModalTop();
  }

  function openPart(storyId, partIndex) {
    const story = allStories.find(s => String(s.id) === String(storyId));
    if (!story) return;
    const part = (story.parts || [])[partIndex];
    if (!part) return;
    showReadingView(story, part, true);
    scrollModalTop();
  }

  function showReadingView(story, source, canGoBack) {
    viewParts.classList.remove('active');
    viewReading.classList.add('active');

    const backBtn   = document.getElementById('reading-back');
    const backLabel = document.getElementById('back-label');

    if (canGoBack) {
      backBtn.dataset.mode = 'parts';
      backLabel.textContent = 'All Parts';
    } else {
      backBtn.dataset.mode = 'close';
      backLabel.textContent = 'Close';
    }

    const eyebrow = source.title && story.title !== source.title
      ? `${story.title} · ${source.title}`
      : story.title || '';
    document.getElementById('reading-eyebrow').textContent = eyebrow;
    document.getElementById('reading-title').textContent   = source.title || story.title || '';

    const coverWrap = document.getElementById('reading-cover-wrap');
    if (source.cover) {
      coverWrap.style.display = 'block';
      coverWrap.innerHTML = `<img src="${escapeAttr(source.cover)}" alt="${escapeAttr(source.title || story.title || '')}" loading="lazy" />`;
    } else {
      coverWrap.style.display = 'none';
      coverWrap.innerHTML = '';
    }

    const content   = source.content || '';
    const bodyEl    = document.getElementById('reading-body');
    const paragraphs = content.split('\n').filter(l => l.trim() !== '');
    bodyEl.innerHTML = paragraphs.length
      ? paragraphs.map(p => `<p>${escapeHTML(p)}</p>`).join('')
      : '<p><em style="color:var(--text-dim)">No content yet.</em></p>';
  }

  /* ─── BACK BUTTON ───────────────────────────────────────── */
  document.getElementById('reading-back').addEventListener('click', function () {
    if (this.dataset.mode === 'parts' && currentStory) {
      showPartsView(currentStory);
      scrollModalTop();
    } else {
      closeModal();
    }
  });

  /* ─── CLOSE BUTTON & OVERLAY CLICK ──────────────────────── */
  document.getElementById('modal-close').addEventListener('click', closeModal);

  overlay.addEventListener('click', function (e) {
    if (e.target === overlay) closeModal();
  });

  /* ─── ESCAPE KEY ─────────────────────────────────────────── */
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal();
  });

  /* ─── RENDER STORIES ─────────────────────────────────────── */
  function renderStories(stories) {
    const grid = document.getElementById('stories-grid');
    const published = stories.filter(s => s.published === true);

    if (!published.length) {
      grid.innerHTML = `
        <div class="stories-empty">
          <div class="stories-empty-icon">✦</div>
          <p>The library awaits its first story…</p>
        </div>`;
      return;
    }

    grid.innerHTML = published.map(story => {
      const parts   = story.parts || [];
      const partCount = parts.length;
      const partLabel = partCount === 0
        ? 'No parts'
        : partCount === 1
          ? '1 part'
          : `${partCount} parts`;

      const coverHTML = story.cover
        ? `<img class="card-cover-img" src="${escapeAttr(story.cover)}" alt="${escapeAttr(story.title || '')}" loading="lazy" />`
        : `<div class="card-cover-placeholder">✦</div>`;

      return `
        <article class="story-card" onclick="openStory(${escapeAttr(String(story.id))})" tabindex="0"
          onkeydown="if(event.key==='Enter'||event.key===' ')openStory(${escapeAttr(String(story.id))})">
          <div class="card-cover-wrap">${coverHTML}</div>
          <div class="card-body">
            <h3 class="card-title">${escapeHTML(story.title || 'Untitled')}</h3>
            <p class="card-meta">Story</p>
            <p class="card-excerpt">${escapeHTML(story.excerpt || '')}</p>
            <span class="card-parts-badge">${escapeHTML(partLabel)}</span>
          </div>
        </article>`;
    }).join('');
  }

  /* ─── FETCH ──────────────────────────────────────────────── */
  (async function loadStories() {
    try {
      const res  = await fetch('/api/stories');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allStories = Array.isArray(data) ? data : [];
    } catch (err) {
      console.error('Failed to load stories:', err);
      allStories = [];
    }
    renderStories(allStories);
  })();

  /* ─── ESCAPE HELPERS ─────────────────────────────────────── */
  function escapeHTML(str) {
    if (typeof str !== 'string') return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeAttr(str) {
    if (typeof str !== 'string') return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
